name: ML Model Training

on:
  workflow_dispatch: # This enables the "Run workflow" button for manual execution
#  schedule:
#    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM
#  workflow_dispatch:

jobs:
  train-models:
    name: Train ML Models
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "\$HOME/.local/bin" >> \$GITHUB_PATH
      
      - name: Install dependencies
        run: poetry install
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: \${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: \${{ secrets.AZURE_TENANT_ID }}
          subscription-id: \${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Download training data
        run: |
          poetry run python scripts/download_training_data.py \
            --workspace-id \${{ secrets.LOG_ANALYTICS_WORKSPACE_ID }} \
            --days 30 \
            --output data/training/
        env:
          AZURE_CLIENT_ID: \${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: \${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: \${{ secrets.AZURE_TENANT_ID }}
      
      - name: Train anomaly detection model
        run: |
          poetry run python src/ml/training/train_anomaly_model.py \
            --data data/training/ \
            --output models/anomaly_detector.pkl
      
      - name: Upload models to Azure Storage
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage blob upload-batch \
              --account-name \${{ secrets.STORAGE_ACCOUNT_NAME }} \
              --destination models \
              --source models/ \
              --overwrite
      
      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: model-v\${{ github.run_number }}
          release_name: ML Models v\${{ github.run_number }}
          body: |
            Trained ML models from automated pipeline
            - Anomaly Detection Model
            - Pattern Recognition Model
            
            Training data: Last 30 days
            Training date: \${{ github.event.repository.updated_at }}
