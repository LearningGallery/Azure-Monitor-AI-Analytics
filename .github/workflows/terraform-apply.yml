name: Terraform Apply

on:
  workflow_dispatch: # This enables the "Run workflow" button for manual execution
#  push:
#    branches:
#      - main
#    paths:
#      - 'terraform/**'
#  workflow_dispatch:
#    inputs:
#      environment:
#        description: 'Environment to deploy'
#        required: true
#        type: choice
#        options:
#          - dev
#          - staging
#          - prod

env:
  TF_VERSION: '1.6.0'

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: 
      name: \${{ github.event.inputs.environment || 'dev' }}
      url: https://\${{ steps.deploy.outputs.container_app_fqdn }}
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: \${{ env.TF_VERSION }}
          terraform_wrapper: false
      
      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: \${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: \${{ secrets.AZURE_TENANT_ID }}
          subscription-id: \${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Terraform Init
        run: terraform init
        working-directory: terraform/environments/\${{ github.event.inputs.environment || 'dev' }}
        env:
          ARM_CLIENT_ID: \${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: \${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: \${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: \${{ secrets.AZURE_TENANT_ID }}
      
      - name: Terraform Apply
        id: deploy
        run: |
          terraform apply -auto-approve
          echo "container_app_fqdn=\$(terraform output -raw container_apps_fqdn)" >> \$GITHUB_OUTPUT
        working-directory: terraform/environments/\${{ github.event.inputs.environment || 'dev' }}
        env:
          ARM_CLIENT_ID: \${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: \${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: \${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: \${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_huggingface_api_key: \${{ secrets.HUGGINGFACE_API_KEY }}
      
      - name: Post Deployment Summary
        run: |
          echo "## Deployment Summary" >> \$GITHUB_STEP_SUMMARY
          echo "" >> \$GITHUB_STEP_SUMMARY
          echo "Environment: \${{ github.event.inputs.environment || 'dev' }}" >> \$GITHUB_STEP_SUMMARY
          echo "API URL: https://\${{ steps.deploy.outputs.container_app_fqdn }}" >> \$GITHUB_STEP_SUMMARY
          echo "Deployed by: \${{ github.actor }}" >> \$GITHUB_STEP_SUMMARY
          echo "Commit: \${{ github.sha }}" >> \$GITHUB_STEP_SUMMARY
